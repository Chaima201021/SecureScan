<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>SecureScan - Résultat d'analyse</title>
  <link href="../assets/img/logoSecureScan.png" rel="icon">
  <link href="../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="../assets/css/main.css" rel="stylesheet">
  <style>
    .result-shell {
      background: linear-gradient(160deg, rgba(19, 30, 58, 0.95), rgba(27, 38, 70, 0.92));
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.22);
      border-radius: 18px;
      color: #f6f8ff;
    }

    .result-card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      padding: 1rem;
      height: 100%;
    }

    .result-card h3 {
      font-size: 1.15rem;
      margin-bottom: 0.65rem;
      color: #ffffff;
    }

    .result-list {
      margin: 0;
      padding-left: 1.2rem;
    }

    .result-list li {
      margin-bottom: 0.35rem;
      color: rgba(238, 243, 255, 0.9);
    }

    .engine-badge {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 0.25rem 0.55rem;
      border-radius: 999px;
      text-transform: uppercase;
      border: 1px solid transparent;
    }

    .engine-nmap {
      background: rgba(25, 135, 84, 0.2);
      color: #7ff0b2;
      border-color: rgba(127, 240, 178, 0.35);
    }

    .engine-fallback {
      background: rgba(255, 193, 7, 0.2);
      color: #ffd666;
      border-color: rgba(255, 214, 102, 0.35);
    }

    .engine-note {
      margin-top: 0.6rem;
      margin-bottom: 0;
      font-size: 0.9rem;
      color: rgba(238, 243, 255, 0.82);
    }

  </style>
</head>

<body class="index-page">
  <main class="main">
    <section class="section">
      <div class="container">
        <div class="result-shell p-4 p-lg-5">
          <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
            <div>
              <h1 class="h3 mb-2">Résultat du scan SecureScan</h1>
              <p class="mb-0" id="result-meta">Chargement du résultat...</p>
            </div>
            <div class="d-flex gap-2">
              <a class="btn btn-outline-light" href="index.html">
                <i class="bi bi-arrow-left me-1"></i>Nouveau scan
              </a>
              <button id="download-report" class="btn btn-primary">
                <i class="bi bi-file-earmark-pdf me-1"></i>Télécharger le rapport PDF
              </button>
            </div>
          </div>

          <div class="row g-3">
            <div class="col-12 col-lg-6">
              <article class="result-card">
                <h3><i class="bi bi-lock me-2"></i>HTTPS</h3>
                <p id="https-summary" class="mb-0"></p>
              </article>
            </div>

            <div class="col-12 col-lg-6">
              <article class="result-card">
                <h3><i class="bi bi-file-earmark-check me-2"></i>Headers de sécurité</h3>
                <ul id="headers-list" class="result-list"></ul>
              </article>
            </div>

            <div class="col-12 col-lg-6">
              <article class="result-card">
                <div class="d-flex align-items-center justify-content-between gap-2 mb-2">
                  <h3 class="mb-0"><i class="bi bi-diagram-3 me-2"></i>Ports ouverts</h3>
                  <span id="ports-engine-badge" class="engine-badge engine-fallback">Fallback</span>
                </div>
                <ul id="ports-list" class="result-list"></ul>
                <p id="ports-engine-note" class="engine-note"></p>
              </article>
            </div>

            <div class="col-12 col-lg-6">
              <article class="result-card">
                <h3><i class="bi bi-bug me-2"></i>Vulnérabilités</h3>
                <ul id="vulnerabilities-list" class="result-list"></ul>
              </article>
            </div>

            <div class="col-12">
              <article class="result-card">
                <h3><i class="bi bi-input-cursor-text me-2"></i>Analyse formulaire</h3>
                <ul id="form-list" class="result-list"></ul>
              </article>
            </div>

          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/result.js"></script>
</body>

</html>
